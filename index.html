<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Өгөөж ломбард </title>
    <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1e3a8a">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div id="app" class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6">
        <!-- Login Form -->
        <div id="login-form">
            <h1 class="text-2xl font-black text-center text-blue-900 mb-6 uppercase">Өгөөж ломбард</h1>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Утасны дугаар</label>
                    <input id="phone" type="tel" class="w-full p-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none transition" placeholder="99112233">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Нууц код (4 оронтой)</label>
                    <input id="pin" type="password" maxlength="4" class="w-full p-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none transition" placeholder="****">
                </div>
                <button onclick="handleLogin()" id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase tracking-wider hover:bg-blue-700 transition active:scale-95">Нэвтрэх</button>
                <button id="install-btn" class="hidden w-full mt-4 bg-emerald-500 text-white py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest shadow-md active:scale-95 transition">
                    Гар утсанд суулгах
                </button>
                <p id="error-msg" class="text-red-500 text-sm text-center font-bold hidden">Мэдээлэл олдсонгүй!</p>
            </div>
        </div>

        <!-- Result Section (Initially Hidden) -->
        <div id="result-section" class="hidden">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 id="res-name" class="text-xl font-bold text-blue-900">Нэр</h2>
                    <p id="res-no" class="text-sm text-gray-500">№: 001</p>
                </div>
                <span class="bg-green-100 text-green-700 text-[10px] font-black px-2 py-1 rounded">ИДЭВХТЭЙ</span>
            </div>

            <div class="space-y-3 bg-gray-50 p-4 rounded-xl">
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Үндсэн мөнгө:</span>
                    <span id="res-amount" class="font-bold">0₮</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Тавьсан огноо:</span>
                    <span id="res-date" class="font-bold">2024-01-01</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Хугацаа:</span>
                    <span id="res-days" class="font-bold">0 хоног</span>
                </div>
                <div class="flex justify-between text-sm border-t pt-2">
                    <span class="text-gray-500">Бодогдсон хүү:</span>
                    <span id="res-hvv" class="font-bold text-red-500">0₮</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Торгууль (20%):</span>
                    <span id="res-penalty" class="font-bold text-red-600">0₮</span>
                </div>
            </div>

            <div class="mt-6 bg-blue-900 text-white p-5 rounded-2xl shadow-lg shadow-blue-200">
                <p class="text-[10px] uppercase font-bold text-blue-300 mb-1">Нийт төлөх дүн</p>
                <h3 id="res-total" class="text-3xl font-black">0₮</h3>
            </div>

            <button onclick="location.reload()" class="w-full mt-6 text-gray-400 text-xs font-bold uppercase tracking-widest">Гарах</button>
        </div>
    </div>

    <script>
     async function handleLogin() {
    const phone = document.getElementById('phone').value;
    const pin = document.getElementById('pin').value;
    const btn = document.getElementById('login-btn');
    const error = document.getElementById('error-msg');
    const resultSection = document.getElementById('result-section');

    if(!phone || !pin) return;

    btn.disabled = true;
    btn.innerText = "УНШИЖ БАЙНА...";
    error.classList.add('hidden');

    try {
        const response = await fetch(`/api/check-loan?phone=${phone}&pin=${pin}`);
        const data = await response.json();

        if (data.success) {
            document.getElementById('login-form').classList.add('hidden');
            resultSection.classList.remove('hidden');

            // 1. Дүн тооцоолох болон Дансны сонголт хийх
            let grandTotal = 0;
            let sumN = 0;
            let sumD = 0;

            data.loans.forEach(loan => {
                const loanTotal = (loan.amount + loan.totalInterest);
                grandTotal += loanTotal;
                if (loan.nd === 'N') sumN += loanTotal;
                if (loan.nd === 'D') sumD += loanTotal;
            });

            // 2. Зээл бүрийн карт
            let loansHtml = data.loans.map(loan => `
                <div class="mb-4 p-5 border-2 border-blue-50 rounded-2xl bg-white shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h2 class="text-lg font-bold text-blue-900">${loan.name}</h2>
                            <p class="text-xs text-gray-400 font-mono uppercase">Гэрийн №: ${loan.no}</p>
                        </div>
                        <span class="bg-green-100 text-green-700 text-[10px] font-black px-2 py-1 rounded">ИДЭВХТЭЙ</span>
                    </div>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between"><span class="text-gray-400">Зээлийн дүн:</span><span class="font-bold">${loan.amount.toLocaleString()}₮</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Сүүлд төлсөн:</span><span class="font-bold text-blue-600">${loan.lastPayment}</span></div>
                        
                        <!-- Хэвийн хоног -->
                        <div class="flex justify-between"><span class="text-gray-400">Хугацаа:</span><span class="font-bold">${loan.normalDays} хоног</span></div>
                        
                        <!-- Хэрэв хугацаа хэтэрсэн бол харуулна -->
                        ${loan.overdueDays > 0 ? `
                        <div class="flex justify-between text-red-600 font-bold italic">
                            <span>Хугацаа хэтэрсэн:</span>
                            <span>${loan.overdueDays} хоног</span>
                        </div>
                        ` : ''}

                        <div class="flex justify-between border-t pt-2"><span class="text-gray-400">Хүү:</span><span class="font-bold text-red-600">${loan.totalInterest.toLocaleString()}₮</span></div>
                        <div class="bg-slate-100 text-blue-900 p-4 rounded-xl mt-4 text-center">
                            <p class="text-[9px] uppercase font-bold opacity-60 mb-1">Төлөх дүн</p>
                            <h3 class="text-xl font-black">${(loan.amount + loan.totalInterest).toLocaleString()}₮</h3>
                        </div>
                    </div>
                </div>
            `).join('');

            // 3. Нийт дүн (Олон зээлтэй бол)
            let summaryHtml = (data.loans.length > 1) ? `
                <div class="mt-2 mb-6 p-5 bg-blue-900 text-white rounded-3xl shadow-lg border-4 border-blue-800">
                    <p class="text-[10px] uppercase font-bold text-blue-300 mb-1 text-center">Бүх зээлийн нийт төлбөр</p>
                    <h3 class="text-3xl font-black text-center">${grandTotal.toLocaleString()}₮</h3>
                </div>
            ` : "";

            // 4. Банкны мэдээлэл сонгох (Аль их дүн дээр нь үндэслэнэ)
            let bankHtml = "";
            const bankData = (sumD >= sumN) ? {
                name: "Ц.Дамдинжав", iban: "79 000 500", acc: "53 0776 0208"
            } : {
                name: "Д.Нямжанцан", iban: "39 000 500", acc: "54 0330 6898"
            };

             bankHtml = `
                <div class="mt-6 p-5 bg-green-50 border-2 border-dashed border-green-200 rounded-2xl text-xs space-y-2">
                    <p class="text-green-700 font-black uppercase text-center mb-2 tracking-widest">💰 Шилжүүлэг хийх данс</p>
                    
                    <div class="flex justify-between items-center border-b border-green-100 pb-2">
                        <span class="text-gray-500">БАНК:</span>
                        <span class="font-bold text-gray-800">ХААН БАНК</span>
                    </div>

                    <div class="flex justify-between items-center border-b border-green-100 pb-2">
                        <span class="text-gray-500">НЭР:</span>
                        <span class="font-bold text-gray-800">${bankData.name}</span>
                    </div>

                    <div class="flex justify-between items-center border-b border-green-100 pb-2">
                        <span class="text-gray-500">IBAN:</span>
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-gray-800">${bankData.iban}</span>
                            <button onclick="copyToClipboard('${bankData.iban}', this)" class="bg-green-200 text-green-700 px-2 py-1 rounded-md text-[9px] font-black hover:bg-green-300 transition">ХУУЛАХ</button>
                        </div>
                    </div>

                    <div class="flex justify-between items-center border-b border-green-100 pb-2">
                        <span class="text-gray-500">ДАНС:</span>
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-blue-800 text-sm tracking-widest">${bankData.acc}</span>
                            <button onclick="copyToClipboard('${bankData.acc}', this)" class="bg-green-200 text-green-700 px-2 py-1 rounded-md text-[9px] font-black hover:bg-green-300 transition">ХУУЛАХ</button>
                        </div>
                    </div>

                    <p class="text-[10px] text-blue-600 pt-2 text-center leading-tight font-medium uppercase">УТГА: Гэрээний дугаар (№) бичнэ үү</p>
                </div>
            `;

            resultSection.innerHTML = loansHtml + summaryHtml + bankHtml + 
                '<button onclick="location.reload()" class="w-full text-gray-400 text-[10px] font-black uppercase py-8 tracking-widest">Системээс гарах</button>';
            
        } else {
            // Идэвхтэй зээлгүй үед
            document.getElementById('login-form').classList.add('hidden');
            resultSection.classList.remove('hidden');
            resultSection.innerHTML = `
                <div class="text-center py-10">
                    <div class="bg-gray-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <h2 class="text-lg font-bold text-gray-800">Танд идэвхтэй зээл байхгүй байна.</h2>
                    <p class="text-gray-400 text-sm mt-2">Баярлалаа.</p>
                    <button onclick="location.reload()" class="mt-8 bg-blue-600 text-white px-8 py-3 rounded-xl font-bold uppercase text-xs">Буцах</button>
                </div>
            `;
        }
    } catch (e) {
        error.innerText = "Сервертэй холбогдоход алдаа гарлаа.";
        error.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.innerText = "ХАРАХ";
    }
}
        // Текст хуулж авах функц
async function copyToClipboard(text, btnElement) {
    try {
        await navigator.clipboard.writeText(text.replace(/\s/g, '')); // Зайг нь арилгаж хуулна
        const originalText = btnElement.innerText;
        btnElement.innerText = "ХУУЛАГДЛАА!";
        btnElement.classList.replace('bg-green-200', 'bg-blue-600');
        btnElement.classList.replace('text-green-700', 'text-white');
        
        setTimeout(() => {
            btnElement.innerText = originalText;
            btnElement.classList.replace('bg-blue-600', 'bg-green-200');
            btnElement.classList.replace('text-white', 'text-green-700');
        }, 2000);
    } catch (err) {
        console.error('Хуулж чадсангүй: ', err);
    }
}
        let deferredPrompt;
const installBtn = document.getElementById('install-btn');

// 1. Service Worker бүртгэх
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
}

// 2. Суулгах боломжтой үед товчийг харуулах
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.classList.remove('hidden'); // Товчийг харуулна
});

// 3. Товчлуур дээр дарахад суулгах цонх гаргах
installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            console.log('User accepted the install prompt');
            installBtn.classList.add('hidden');
        }
        deferredPrompt = null;
    }
});

// 4. Хэрэв аль хэдийн суулгасан бол товчийг нуух
window.addEventListener('appinstalled', () => {
    installBtn.classList.add('hidden');
    deferredPrompt = null;
});
    </script>
</body>
</html>
