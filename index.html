<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Өгөөж Ломбард</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            font-family: 'Montserrat', sans-serif;
            color: white;
        }
        /* Алтлаг текст (Хар дэвсгэр дээр) */
        .gold-text {
            color: #D4AF37;
            background: linear-gradient(to right, #BF953F, #FCF6BA, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Алтлаг дэвсгэр + ХАР ТЕКСТ (Уншихад маш тодорхой) */
        .gold-bg-block {
            background: linear-gradient(to bottom, #FCF6BA, #BF953F, #AA771C);
            color: #000000;
            box-shadow: 0 4px 15px rgba(191, 149, 63, 0.4);
        }
        .card-bg {
            background-color: #0f0f0f;
            border: 1px solid #222;
        }
        .fancy-font {
            font-family: 'Playfair Display', serif;
        }
        input::placeholder {
            color: #444;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div id="app" class="w-full max-w-md bg-[#080808] rounded-3xl shadow-[0_0_60px_rgba(191,149,63,0.15)] p-8 border border-white/5">
        
        <!-- Login Form -->
        <div id="login-form">
            <div class="text-center mb-10">
                <img src="/home.png" alt="Өгөөж Ломбард" class="w-3/4 mx-auto h-auto object-contain">
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-white-500 uppercase tracking-widest ml-1">Утасны дугаар</label>
                    <input id="phone" type="tel" class="w-full p-4 bg-black border-b-2 border-white/10 text-white focus:border-[#D4AF37] outline-none transition mt-1 font-bold" placeholder="99112233">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-white-500 uppercase tracking-widest ml-1">Нууц код</label>
                    <input id="pin" type="password" maxlength="4" class="w-full p-4 bg-black border-b-2 border-white/10 text-white focus:border-[#D4AF37] outline-none transition mt-1 font-bold" placeholder="****">
                </div>
                <button onclick="handleLogin()" id="login-btn" class="w-full gold-bg-block py-4 rounded-full font-black uppercase tracking-widest hover:brightness-110 transition active:scale-95 mt-6">
                    Нэвтрэх
                </button>
                <button id="install-btn" class="w-full mt-4 bg-transparent border border-[#D4AF37]/50 text-[#D4AF37] py-3 rounded-full font-bold uppercase text-[10px] tracking-[0.2em] active:scale-95 transition">
                    📲 ГАР УТАСАНД СУУЛГАХ
                </button>
                <p id="error-msg" class="text-red-500 text-xs text-center font-bold hidden">Мэдээлэл олдсонгүй!</p>
            </div>
        </div>

        <!-- Result Section -->
        <div id="result-section" class="hidden"></div>
    </div>

    <script>
        async function handleLogin() {
            const phone = document.getElementById('phone').value;
            const pin = document.getElementById('pin').value;
            const btn = document.getElementById('login-btn');
            const error = document.getElementById('error-msg');
            const resultSection = document.getElementById('result-section');

            if(!phone || !pin) return;
            btn.disabled = true;
            btn.innerText = "УНШИЖ БАЙНА...";
            error.classList.add('hidden');

            try {
                const response = await fetch(`/api/check-loan?phone=${phone}&pin=${pin}`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('login-form').classList.add('hidden');
                    resultSection.classList.remove('hidden');

                    let grandTotal = 0;
                    let sumPrincipal = 0; // Нийт үндсэн зээл
                    let sumInterest = 0;  // Нийт хүү
                    let sumN = 0, sumD = 0;
                    
                    data.loans.forEach(loan => {
                        const loanTotal = (loan.amount + loan.totalInterest);
                        grandTotal += loanTotal;
                        sumPrincipal += loan.amount;
                        sumInterest += loan.totalInterest;
                    
                        if (loan.nd === 'N') sumN += loanTotal;
                        if (loan.nd === 'D') sumD += loanTotal;
                    });

                    // Зээлийн картууд
                    let loansHtml = data.loans.map(loan => `
                        <div class="mb-6 p-6 gold-bg-block rounded-2xl relative overflow-hidden">
                            <!-- Зээлийн толгой хэсэг -->
                            <div class="flex justify-between items-start mb-6 border-b border-black/10 pb-4">
                                <div>
                                    <h2 class="text-2xl font-black text-black uppercase fancy-font leading-none">${loan.name}</h2>
                                    <p class="text-[10px] text-black/60 font-bold uppercase mt-1">Гэрийн №: ${loan.no}</p>
                                </div>
                                <span class="text-[9px] font-black px-2 py-1 border border-black/20 text-black rounded uppercase">Идэвхтэй</span>
                            </div>
                            
                            <!-- Зээлийн дэлгэрэнгүй мэдээлэл (Данс харагддаг шиг бүтэц) -->
                            <div class="space-y-3 text-[11px] font-bold">
                                <div class="flex justify-between border-b border-black/10 pb-2 text-black/70">
                                    <span>ЗЭЭЛИЙН ДҮН:</span>
                                    <span class="text-black font-black">${loan.amount.toLocaleString()}₮</span>
                                </div>
                                <div class="flex justify-between border-b border-black/10 pb-2 text-black/70">
                                    <span>СҮҮЛД ТӨЛСӨН:</span>
                                    <span class="text-black font-black">${loan.lastPayment}</span>
                                </div>
                                <div class="flex justify-between border-b border-black/10 pb-2 text-black/70">
                                    <span>ХУГАЦАА:</span>
                                    <span class="text-black font-black">${loan.normalDays} хоног</span>
                                </div>
                                
                                ${loan.overdueDays > 0 ? `
                                <div class="flex justify-between border-b border-black/10 pb-2 text-red-800">
                                    <span>ХУГАЦАА ХЭТЭРСЭН:</span>
                                    <span class="font-black">${loan.overdueDays} хоног</span>
                                </div>
                                ` : ''}
                                
                                <div class="flex justify-between border-b border-black/10 pb-2 text-black/70">
                                    <span>ХҮҮ + ТОРГУУЛЬ:</span>
                                    <span class="text-black font-black">${loan.totalInterest.toLocaleString()}₮</span>
                                </div>
                    
                                <!-- ТӨЛӨХ ДҮН: Голлуулсан хар блок -->
                                <div class="bg-black text-white p-5 rounded-xl mt-5 shadow-lg text-center">
                                    <p class="text-[10px] uppercase font-black mb-1 opacity-50 tracking-widest">Төлөх дүн</p>
                                    <h3 class="text-3xl font-black text-[#FCF6BA] tracking-tighter">
                                        ${(loan.amount + loan.totalInterest).toLocaleString()}₮
                                    </h3>
                                </div>
                            </div>
                        </div>
                    `).join('');

                    // НИЙТ ДҮН: Алтлаг дэвсгэр дээр Хар текст
                                    let summaryHtml = (data.loans.length > 1) ? `
                    <div class="mb-8 p-6 gold-bg-block rounded-3xl shadow-2xl space-y-2">
                        <p class="text-[10px] uppercase font-black mb-3 opacity-70 text-center border-b border-black/10 pb-2">БҮХ ЗЭЭЛИЙН НИЙТ ТӨЛБӨР</p>
                        
                        <div class="flex justify-between text-xs font-bold px-2">
                            <span class="opacity-70">Нийт зээл:</span>
                            <span>${sumPrincipal.toLocaleString()}₮</span>
                        </div>
                        
                        <div class="flex justify-between text-xs font-bold px-2">
                            <span class="opacity-70">Нийт хүү:</span>
                            <span>${sumInterest.toLocaleString()}₮</span>
                        </div>
                        
                        <div class="flex justify-between text-base font-black px-2 pt-2 border-t border-black/10 mt-2">
                            <span>НИЙТ ТӨЛӨЛТ:</span>
                            <span class="text-xl">${grandTotal.toLocaleString()}₮</span>
                        </div>
                    </div>
                ` : "";

                    const bankData = (sumD >= sumN) ? { name: "Ц.Дамдинжав", iban: "79 000 500", acc: "53 0776 0208" } : { name: "Д.Нямжанцан", iban: "39 000 500", acc: "54 0330 6898" };

                    // ДАНСНЫ ХЭСЭГ: Алтлаг дэвсгэр дээр Хар текст
                    let bankHtml = `
                        <div class="mt-8 p-6 gold-bg-block rounded-2xl relative overflow-hidden">
                            <p class="font-black uppercase text-center mb-5 tracking-tighter">Шилжүүлэг хийх данс</p>
                            <div class="space-y-3 text-[11px] font-bold">
                                <div class="flex justify-between border-b border-black/10 pb-2"><span>БАНК:</span><span>ХААН БАНК</span></div>
                                <div class="flex justify-between border-b border-black/10 pb-2"><span>НЭР:</span><span>${bankData.name}</span></div>
                                <div class="flex justify-between border-b border-black/10 pb-2">
                                    <span>IBAN:</span>
                                    <div class="flex items-center gap-2">
                                        <span>${bankData.iban}</span>
                                        <button onclick="copyToClipboard('${bankData.iban}', this)" class="bg-black/10 px-2 py-0.5 rounded text-[8px] font-black">ХУУЛАХ</button>
                                    </div>
                                </div>
                                <div class="flex justify-between items-center pt-2">
                                    <span>ДАНС:</span>
                                    <div class="flex items-center gap-3">
                                        <span class="text-2xl font-black tracking-tighter">${bankData.acc}</span>
                                        <button onclick="copyToClipboard('${bankData.acc}', this)" class="bg-black text-white px-3 py-1.5 rounded-lg text-[9px] font-black uppercase">Хуулах</button>
                                    </div>
                                </div>
                            </div>
                            <p class="text-[9px] text-black/60 pt-5 text-center italic font-bold uppercase">УТГА: Гэрээний дугаар (№) бичнэ үү</p>
                        </div>
                    `;

                    resultSection.innerHTML = loansHtml + summaryHtml + bankHtml + 
                        '<button onclick="location.reload()" class="w-full text-white-700 text-[10px] font-black uppercase py-10 tracking-[0.5em]">Системээс гарах</button>';
                    
                } else {
                    document.getElementById('login-form').classList.add('hidden');
                    resultSection.classList.remove('hidden');
                    resultSection.innerHTML = `<div class="text-center py-20"><h2 class="text-lg font-bold text-white-600 uppercase">Идэвхтэй зээлгүй</h2><button onclick="location.reload()" class="mt-8 gold-text text-[10px] font-black uppercase py-3 rounded-full">Буцах</button></div>`;
                }
            } catch (e) {
                error.innerText = "Алдаа гарлаа."; error.classList.remove('hidden');
            } finally {
                btn.disabled = false; btn.innerText = "Нэвтрэх";
            }
        }

        async function copyToClipboard(text, btnElement) {
            try {
                await navigator.clipboard.writeText(text.replace(/\s/g, ''));
                const originalText = btnElement.innerText;
                btnElement.innerText = "ОК!";
                setTimeout(() => { btnElement.innerText = originalText; }, 2000);
            } catch (err) { console.error(err); }
        }

        let deferredPrompt;
    const installBtn = document.getElementById('install-btn');

    // 1. Service Worker бүртгэх
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js');
        });
    }

    // 2. Android-ын Install Prompt-ыг барьж авах
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Андройд дээр суулгах боломжтой бол товчны өнгийг илүү тод болгож болно
        installBtn.classList.replace('text-[#D4AF37]', 'gold-bg-block'); 
        installBtn.classList.remove('bg-transparent', 'border');
    });

    // 3. Товчлуур дарах үед
    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            // Андройд системд суулгах цонхыг нь дуудаж гаргах
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.classList.add('hidden'); // Суулгачихвал товчийг нууна
            }
            deferredPrompt = null;
        } else {
            // Хэрэв шууд суулгах боломжгүй бол (iOS эсвэл Chrome бэлэн биш) заавар өгөх
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            
            if (isIOS) {
                alert("iPhone дээр суулгах заавар:\n\n1. Доор байх 'Share' (сумтай дөрвөлжин) товчийг дар.\n2. Гарч ирэх цэснээс 'Add to Home Screen' гэдгийг сонго.");
            } else {
                alert("Андройд дээр суулгах заавар:\n\n1. Хөтөчийн баруун дээд талын 3 цэг дээр дар.\n2. 'Install app' эсвэл 'Add to Home screen' гэдгийг сонго.");
            }
        }
    });
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        installBtn.classList.add('hidden');
    }
    </script>
</body>
</html>
