<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ломбард - Миний тооцоо</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div id="app" class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6">
        <!-- Login Form -->
        <div id="login-form">
            <h1 class="text-2xl font-black text-center text-blue-900 mb-6 uppercase">Миний Тооцоо</h1>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Утасны дугаар</label>
                    <input id="phone" type="tel" class="w-full p-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none transition" placeholder="99112233">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Нууц код (4 оронтой)</label>
                    <input id="pin" type="password" maxlength="4" class="w-full p-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none transition" placeholder="****">
                </div>
                <button onclick="handleLogin()" id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase tracking-wider hover:bg-blue-700 transition active:scale-95">Харах</button>
                <p id="error-msg" class="text-red-500 text-sm text-center font-bold hidden">Мэдээлэл олдсонгүй!</p>
            </div>
        </div>

        <!-- Result Section (Initially Hidden) -->
        <div id="result-section" class="hidden">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 id="res-name" class="text-xl font-bold text-blue-900">Нэр</h2>
                    <p id="res-no" class="text-sm text-gray-500">№: 001</p>
                </div>
                <span class="bg-green-100 text-green-700 text-[10px] font-black px-2 py-1 rounded">ИДЭВХТЭЙ</span>
            </div>

            <div class="space-y-3 bg-gray-50 p-4 rounded-xl">
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Үндсэн мөнгө:</span>
                    <span id="res-amount" class="font-bold">0₮</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Тавьсан огноо:</span>
                    <span id="res-date" class="font-bold">2024-01-01</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Хугацаа:</span>
                    <span id="res-days" class="font-bold">0 хоног</span>
                </div>
                <div class="flex justify-between text-sm border-t pt-2">
                    <span class="text-gray-500">Бодогдсон хүү:</span>
                    <span id="res-hvv" class="font-bold text-red-500">0₮</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Торгууль (20%):</span>
                    <span id="res-penalty" class="font-bold text-red-600">0₮</span>
                </div>
            </div>

            <div class="mt-6 bg-blue-900 text-white p-5 rounded-2xl shadow-lg shadow-blue-200">
                <p class="text-[10px] uppercase font-bold text-blue-300 mb-1">Нийт төлөх дүн</p>
                <h3 id="res-total" class="text-3xl font-black">0₮</h3>
            </div>

            <button onclick="location.reload()" class="w-full mt-6 text-gray-400 text-xs font-bold uppercase tracking-widest">Гарах</button>
        </div>
    </div>

    <script>
        async function handleLogin() {
    const phone = document.getElementById('phone').value;
    const pin = document.getElementById('pin').value;
    const btn = document.getElementById('login-btn');
    const error = document.getElementById('error-msg');
    const resultSection = document.getElementById('result-section');

    if(!phone || !pin) return;

    btn.disabled = true;
    btn.innerText = "УНШИЖ БАЙНА...";
    error.classList.add('hidden');

    try {
        const response = await fetch(`/api/check-loan?phone=${phone}&pin=${pin}`);
        const data = await response.json();

        if (data.success) {
            document.getElementById('login-form').classList.add('hidden');
            resultSection.classList.remove('hidden');
            
            // Олон зээлийг зурах хэсэг
            resultSection.innerHTML = data.loans.map(loan => `
                <div class="mb-8 p-4 border-2 border-blue-50 rounded-2xl bg-white shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h2 class="text-lg font-bold text-blue-900">${loan.name}</h2>
                            <p class="text-xs text-gray-400 font-mono">№: ${loan.no}</p>
                        </div>
                        <span class="bg-green-100 text-green-700 text-[10px] font-black px-2 py-1 rounded">ИДЭВХТЭЙ</span>
                    </div>

                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between"><span class="text-gray-400">Үндсэн үлдэгдэл:</span><span class="font-bold">${loan.amount.toLocaleString()}₮</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Сүүлд төлсөн:</span><span class="font-bold text-blue-600">${loan.lastPayment}</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Хугацаа:</span><span class="font-bold">${loan.days} хоног</span></div>
                        <div class="flex justify-between border-t pt-2"><span class="text-gray-400">Бодогдсон хүү:</span><span class="font-bold">${loan.interest.toLocaleString()}₮</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Торгууль:</span><span class="font-bold text-red-500">${loan.penalty.toLocaleString()}₮</span></div>
                        <div class="bg-blue-900 text-white p-4 rounded-xl mt-4">
                            <p class="text-[9px] uppercase opacity-60 mb-1">Нийт төлөх дүн</p>
                            <h3 class="text-2xl font-black">${(loan.amount + loan.totalInterest).toLocaleString()}₮</h3>
                        </div>
                    </div>
                </div>
            `).join('') + '<button onclick="location.reload()" class="w-full text-gray-400 text-xs font-bold uppercase py-4">Гарах</button>';
            
        } else {
            error.innerText = data.message;
            error.classList.remove('hidden');
        }
    } catch (e) {
        error.innerText = "Алдаа гарлаа.";
        error.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.innerText = "ХАРАХ";
    }
}
    </script>
</body>
</html>
